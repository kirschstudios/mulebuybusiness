<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comanda Mulebuy Business</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="money-background" id="money-bg"></div>

    <div class="container">
        <header>
            <h1>💼 Comanda Mulebuy Business 💼</h1>
            <p>Gestionarea comenzilor pentru Lukas, Alex, Adelin și Cristi</p>
        </header>

        <div class="main-layout">
            <div class="content-area" id="tables-container">
                </div>

            <aside class="grand-total-panel">
                <h2>📊 TOTAL COMANDĂ</h2>
                <div class="summary-box">
                    <p>Total Bani:</p>
                    <h3 id="grand-total-price">0.00 RON</h3>
                </div>
                <div class="summary-box">
                    <p>Greutate Colet:</p>
                    <h3 id="grand-total-weight">0 g</h3>
                    <small id="kg-estimate">(0.00 kg)</small>
                </div>
            </aside>
        </div>
    </div>

    <div id="add-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Adaugă produs</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="modal-form" onsubmit="submitModalForm(event)">
                <input type="hidden" id="modal-person">
                
                <input type="text" id="modal-name" placeholder="Nume produs" required>
                <input type="text" id="modal-model" placeholder="Model" required>
                <input type="text" id="modal-size" placeholder="Mărime" required>
                <input type="number" id="modal-price" placeholder="Preț (RON)" step="0.01" required>
                <input type="number" id="modal-weight" placeholder="Grame (g)" required>
                <input type="url" id="modal-link" placeholder="Link (https://...)" required>
                
                <button type="submit" class="btn-submit">Adaugă Produsul</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
